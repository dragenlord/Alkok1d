<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALKA — Админ | Создать шаг приготовления</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; background: #050a12; overflow-x: hidden; }
        .bottle-wall { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 30px; padding: 50px; background: #050a12; }
        .bg-bottle { width: 160px; height: auto; object-fit: contain; border-radius: 28px; filter: blur(6px) brightness(0.5) hue-rotate(180deg) saturate(1.5); opacity: 0.7; background: rgba(5,15,28,0.3); backdrop-filter: blur(2px); }
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; background: rgba(5,15,25,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,150,255,0.4); padding: 0.75rem 1rem; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 0.5rem 1rem; }
        .nav-link { color: #b8e2ff; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.5rem 1rem; border-radius: 40px; transition: all 0.2s ease; background: rgba(0,50,80,0.4); border: 1px solid rgba(0,150,255,0.3); backdrop-filter: blur(4px); white-space: nowrap; }
        .nav-link:hover { background: rgba(0,150,255,0.3); border-color: #4cc9ff; color: white; transform: translateY(-2px); }
        .nav-link.active { background: linear-gradient(135deg, #0a4d8c, #0066aa); border-color: #4cc9ff; color: white; }
        .content-wrapper { margin-top: 70px; position: relative; z-index: 20; min-height: calc(100vh - 70px); padding: 2rem; }
        @media (max-width: 700px) { .content-wrapper { margin-top: 80px; padding: 1rem; } }
        .main-container { max-width: 800px; margin: 0 auto; }
        .page-header { text-align: center; margin-bottom: 2rem; }
        .page-header h1 { color: #4cc9ff; font-size: 2rem; text-shadow: 0 0 5px rgba(76,201,255,0.3); }
        .page-header p { color: #8ec9ff; font-size: 0.9rem; }
        .form-card { background: rgba(5,15,28,0.85); backdrop-filter: blur(16px); border-radius: 28px; border: 1px solid rgba(0,150,255,0.2); padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; color: #4cc9ff; font-weight: 500; margin-bottom: 0.5rem; }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 0.8rem 1rem; background: rgba(0,30,50,0.6); border: 1px solid rgba(0,150,255,0.3); border-radius: 16px; color: #e0f0ff; font-size: 1rem; }
        .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: #4cc9ff; box-shadow: 0 0 10px rgba(76,201,255,0.3); background: rgba(0,40,70,0.7); }
        .form-textarea { resize: vertical; min-height: 100px; }
        .steps-container { background: rgba(0,40,60,0.4); border-radius: 20px; padding: 1.2rem; margin-bottom: 1.5rem; }
        .step-row { display: flex; gap: 1rem; margin-bottom: 0.8rem; align-items: flex-start; }
        .step-number { width: 60px; background: rgba(0,150,255,0.15); border-radius: 12px; text-align: center; font-size: 1.3rem; font-weight: bold; color: #4cc9ff; padding: 0.8rem; }
        .step-description { flex: 1; }
        .remove-step { background: rgba(255,50,50,0.2); border: 1px solid rgba(255,80,80,0.5); color: #ff8888; padding: 0.5rem 0.8rem; border-radius: 12px; cursor: pointer; height: fit-content; margin-top: 0.5rem; }
        .add-step-btn { background: rgba(0,150,255,0.2); border: 1px dashed #4cc9ff; color: #4cc9ff; padding: 0.6rem 1.2rem; border-radius: 20px; cursor: pointer; width: 100%; font-size: 0.9rem; }
        .submit-btn { width: 100%; background: linear-gradient(135deg, #0a4d8c, #0066aa); border: none; padding: 1rem; border-radius: 40px; color: white; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,150,255,0.3); }
        .back-link { display: inline-block; margin-top: 1.5rem; color: #8ec9ff; text-decoration: none; }
        .success-message { background: rgba(0,200,150,0.2); border: 1px solid #00cc88; color: #88ffcc; padding: 1rem; border-radius: 20px; margin-bottom: 1.5rem; text-align: center; }
    </style>
</head>
<body>

<div class="bottle-wall" id="bottleWall"></div>

<div class="top-nav">
    <div class="nav-container">
        <a class="nav-link" th:href="@{/main}">🏠 Главная</a>
        <a class="nav-link" th:href="@{/level}">🍾 Уровни</a>
        <a class="nav-link" th:href="@{/assortment}">🍷 Ассортимент</a>
        <a class="nav-link" th:href="@{/profile}">👤 Профиль</a>
        <a class="nav-link active" th:href="@{/admin/create}">👑 Админ-панель</a>
    </div>
</div>

<div class="content-wrapper">
    <div class="main-container">
        <div class="page-header">
            <h1>📋 Шаги приготовления коктейля</h1>
            <p>Добавьте пошаговую инструкцию для существующего коктейля</p>
        </div>

        <div th:if="${success}" class="success-message">
            ✅ Шаги успешно добавлены! Коктейль: <span th:text="${cocktailName}"></span>
        </div>

        <div class="form-card">
            <form th:action="@{/admin/steps/create}" th:method="post" id="stepsForm">
                <div class="form-group">
                    <label class="form-label">🍸 Выберите коктейль *</label>
                    <select name="cocktailId" class="form-select" required>
                        <option value="">-- Выберите коктейль --</option>
                        <option th:each="cocktail : ${cocktails}" th:value="${cocktail.id}" th:text="${cocktail.cocktailName}"></option>
                    </select>
                </div>

                <div class="steps-container">
                    <h3 style="color:#4cc9ff; margin-bottom: 1rem;">📝 Шаги приготовления</h3>
                    <div id="stepsContainer">
                        <div class="step-row">
                            <div class="step-number">1</div>
                            <div class="step-description">
                                <textarea name="descriptions" class="form-textarea" placeholder="Опишите первый шаг..." required style="min-height: 70px;"></textarea>
                            </div>
                            <button type="button" class="remove-step" onclick="this.parentElement.remove(); renumberSteps()">🗑</button>
                        </div>
                    </div>
                    <button type="button" class="add-step-btn" onclick="addStep()">+ Добавить шаг</button>
                </div>

                <button type="submit" class="submit-btn">✨ Сохранить рецепт</button>
            </form>
            <a th:href="@{/admin/dashboard}" class="back-link">← Вернуться в админ-панель</a>
        </div>
    </div>
</div>

<script>
    const bottleWall = document.getElementById('bottleWall');
    const bottles = ['/images/vodka.png', '/images/bottle.png', '/images/finsky-ice.jpeg', '/images/stakan.png', '/images/redbull.png'];
    for (let i = 0; i < 28; i++) {
        const img = document.createElement('img');
        img.classList.add('bg-bottle');
        img.src = bottles[i % bottles.length];
        img.onerror = function() { this.style.display = 'none'; };
        img.style.transform = `rotate(${(Math.random() - 0.5) * 12}deg) scale(${0.7 + Math.random() * 0.7})`;
        img.style.width = `${120 + Math.random() * 70}px`;
        bottleWall.appendChild(img);
    }

    let stepCounter = 1;

    function addStep() {
        const container = document.getElementById('stepsContainer');
        stepCounter = container.children.length + 1;
        const newStep = document.createElement('div');
        newStep.className = 'step-row';
        newStep.innerHTML = `
            <div class="step-number">${stepCounter}</div>
            <div class="step-description">
                <textarea name="descriptions" class="form-textarea" placeholder="Опишите следующий шаг..." required style="min-height: 70px;"></textarea>
            </div>
            <button type="button" class="remove-step" onclick="this.parentElement.remove(); renumberSteps()">🗑</button>
        `;
        container.appendChild(newStep);
    }

    function renumberSteps() {
        const steps = document.querySelectorAll('.step-row');
        steps.forEach((step, index) => {
            const numberDiv = step.querySelector('.step-number');
            if (numberDiv) numberDiv.textContent = (index + 1).toString();
        });
    }
</script>

</body>
</html>
