<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ALKA — FINLAND ICE | Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            background: #0a0f1a;
        }

        /* ========= ФОН ПЕРВОЙ СТРАНИЦЫ ========= */
        .hero-fullscreen-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .hero-fullscreen-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            filter: brightness(0.4) contrast(1.2) saturate(1.15);
            transform: scale(1.05);
        }

        .hero-fullscreen-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 60%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
        }

        .vignette-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.5) 80%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* ========= ВЕРХНЯЯ НАВИГАЦИОННАЯ ПАНЕЛЬ ========= */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: rgba(5, 15, 25, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 150, 255, 0.4);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            padding: 0.75rem 1rem;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.5rem 1rem;
        }

        .nav-link {
            color: #b8e2ff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            background: rgba(0, 50, 80, 0.4);
            border: 1px solid rgba(0, 150, 255, 0.3);
            backdrop-filter: blur(4px);
            white-space: nowrap;
            cursor: pointer;
        }

        .nav-link:hover {
            background: rgba(0, 150, 255, 0.3);
            border-color: #4cc9ff;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,150,255,0.2);
        }

        .nav-link.active {
            background: linear-gradient(135deg, #0a4d8c, #0066aa);
            border-color: #4cc9ff;
            color: white;
            box-shadow: 0 0 12px rgba(76,201,255,0.3);
        }

        .content-wrapper {
            margin-top: 70px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 20;
            min-height: calc(100vh - 70px);
        }

        @media (max-width: 700px) {
            .nav-container { gap: 0.4rem; }
            .nav-link { font-size: 0.7rem; padding: 0.35rem 0.7rem; }
            .content-wrapper { margin-top: 80px; }
        }

        /* ========= БОКОВЫЕ КНОПКИ (FAB) ========= */
        .side-actions {
            position: fixed;
            right: 24px;
            bottom: 120px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .side-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            background: rgba(10, 30, 45, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(76, 201, 255, 0.6);
            border-radius: 60px;
            padding: 10px 20px 10px 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-decoration: none;
            color: #e0f0ff;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            width: auto;
            min-width: 180px;
        }

        .side-btn .emoji {
            font-size: 1.5rem;
            filter: drop-shadow(0 0 4px #4cc9ff);
        }

        .side-btn .btn-text {
            white-space: nowrap;
        }

        .side-btn:hover {
            background: rgba(0, 100, 150, 0.85);
            border-color: #4cc9ff;
            transform: translateX(-6px) scale(1.02);
            box-shadow: 0 0 18px rgba(76,201,255,0.4);
            color: white;
        }

        .side-btn:active {
            transform: translateX(-2px) scale(0.98);
        }

        @media (max-width: 800px) {
            .side-actions {
                right: 12px;
                bottom: 90px;
                gap: 12px;
            }
            .side-btn {
                min-width: 140px;
                padding: 6px 14px 6px 12px;
            }
            .side-btn .emoji {
                font-size: 1.2rem;
            }
            .side-btn .btn-text {
                font-size: 0.75rem;
                white-space: nowrap;
            }
        }

        @media (max-width: 550px) {
            .side-actions {
                right: 8px;
                bottom: 70px;
            }
            .side-btn {
                min-width: 120px;
                padding: 5px 10px 5px 8px;
            }
            .side-btn .btn-text {
                font-size: 0.65rem;
            }
        }

        /* ========= СОЛНЕЧНЫЙ ЛУЧ ОТ НАДПИСИ ALKA ========= */
        .sun-beam {
            position: fixed;
            top: 16%;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 450px;
            background: linear-gradient(180deg,
            rgba(76, 201, 255, 0.7) 0%,
            rgba(0, 150, 255, 0.4) 30%,
            rgba(0, 100, 200, 0.15) 60%,
            transparent 100%);
            clip-path: polygon(35% 0%, 65% 0%, 80% 100%, 20% 100%);
            filter: blur(8px);
            pointer-events: none;
            z-index: 8;
            animation: sunRayPulse 3s ease-in-out infinite;
        }

        .sun-beam-wide {
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 500px;
            background: linear-gradient(180deg,
            rgba(76, 201, 255, 0.35) 0%,
            rgba(0, 150, 255, 0.15) 40%,
            transparent 100%);
            clip-path: polygon(25% 0%, 75% 0%, 90% 100%, 10% 100%);
            filter: blur(20px);
            pointer-events: none;
            z-index: 7;
            animation: sunRayWide 4s ease-in-out infinite;
        }

        .logo-glow {
            position: fixed;
            top: 14%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 120px;
            background: radial-gradient(ellipse at center, rgba(76, 201, 255, 0.4) 0%, rgba(0, 150, 255, 0.1) 50%, transparent 80%);
            filter: blur(25px);
            pointer-events: none;
            z-index: 6;
            border-radius: 50%;
            animation: sunGlow 2.5s ease-in-out infinite;
        }

        @keyframes sunRayPulse {
            0%, 100% { opacity: 0.7; transform: translateX(-50%) scaleY(1); }
            50% { opacity: 1; transform: translateX(-50%) scaleY(1.05); }
        }

        @keyframes sunRayWide {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) scaleY(1); }
            50% { opacity: 0.8; transform: translateX(-50%) scaleY(1.08); }
        }

        @keyframes sunGlow {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        /* ========= РУКИ, ДЕРЖАЩИЕ БУТЫЛКУ ========= */
        .hands-holder {
            position: fixed;
            bottom: 5%;
            left: 0;
            width: 100%;
            height: 30%;
            z-index: 5;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
        }

        .hand-left {
            width: 180px;
            height: 200px;
            background: radial-gradient(ellipse at 70% 50%, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 80%);
            transform: rotate(-15deg) translateX(20px);
            filter: blur(8px);
            border-radius: 60% 40% 50% 50%;
        }

        .hand-right {
            width: 180px;
            height: 200px;
            background: radial-gradient(ellipse at 30% 50%, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 80%);
            transform: rotate(15deg) translateX(-20px);
            filter: blur(8px);
            border-radius: 40% 60% 50% 50%;
        }

        .fingers {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            display: flex;
            justify-content: center;
            gap: 25px;
            z-index: 6;
            pointer-events: none;
        }

        .finger {
            width: 20px;
            height: 70px;
            background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.15));
            border-radius: 20px;
            filter: blur(4px);
            transform: rotate(5deg);
        }

        .finger:nth-child(2) { transform: rotate(0deg); height: 80px; }
        .finger:nth-child(3) { transform: rotate(-5deg); height: 65px; }
        .finger:nth-child(4) { transform: rotate(-8deg); height: 55px; }

        /* ========= ГЛАВНАЯ БУТЫЛКА ========= */
        .hero-bottle-main {
            position: fixed;
            top: 52%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            z-index: 10;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
            animation: floatBottle 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatBottle {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
            50% { transform: translate(-50%, -50%) translateY(-8px); }
        }

        /* ========= ЛОГОТИП ALKA ========= */
        .logo-above {
            position: fixed;
            top: 14%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 12;
            filter: drop-shadow(0 0 20px rgba(76, 201, 255, 0.8));
            animation: logoPulse 2s ease-in-out infinite;
        }

        .logo-above h1 {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4cc9ff 0%, #00a6ff 50%, #0a4d8c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(76, 201, 255, 0.6);
        }

        .logo-above p {
            color: #4cc9ff;
            font-size: 0.7rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: -5px;
        }

        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(76, 201, 255, 0.6)); }
            50% { filter: drop-shadow(0 0 30px rgba(76, 201, 255, 0.9)); }
        }

        /* ========= ФОН ВТОРОЙ СТРАНИЦЫ ========= */
        .bottle-wall {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 50px;
            opacity: 0;
            transition: opacity 0.5s ease;
            background: #050a12;
        }

        body.level-active .bottle-wall {
            opacity: 0.35;
        }

        .bg-bottle {
            width: 160px;
            height: auto;
            object-fit: contain;
            border-radius: 28px;
            filter: blur(6px) brightness(0.5) hue-rotate(180deg) saturate(1.5);
            transform: rotate(2deg);
            opacity: 0.7;
        }

        body.level-active {
            background: #050a12;
        }

        /* ========= ОСНОВНОЙ КОНТЕЙНЕР ========= */
        .fullscreen {
            position: relative;
            z-index: 20;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========= ПЕРВАЯ СТРАНИЦА ========= */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            padding: 2rem;
            padding-bottom: 4rem;
            background: transparent;
            position: relative;
            z-index: 15;
            min-height: 100vh;
        }

        .main-action-btn {
            background: linear-gradient(135deg, rgba(0, 30, 60, 0.95), rgba(0, 10, 25, 0.98));
            border: 2px solid #00a6ff;
            color: #4cc9ff;
            font-size: 2rem;
            font-weight: 700;
            padding: 1rem 2.5rem;
            border-radius: 80px;
            min-width: 280px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 8px;
            backdrop-filter: blur(12px);
            font-family: inherit;
            text-align: center;
            transition: all 0.2s ease;
            animation: pulseGlow 2s infinite ease-in-out;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            z-index: 25;
            position: relative;
            margin-top: 2rem;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); border-color: rgba(0,150,255,0.5); }
            50% { transform: scale(1.02); border-color: #4cc9ff; }
            100% { transform: scale(1); border-color: rgba(0,150,255,0.5); }
        }

        .main-action-btn:active {
            transform: scale(0.98);
            animation: none;
        }

        .hero-footer {
            margin-top: 1.5rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            z-index: 25;
            position: relative;
        }

        .hero-footer span {
            color: #4cc9ff;
            font-size: 0.7rem;
            letter-spacing: 3px;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0,150,255,0.3);
        }

        @media (max-width: 800px) {
            .logo-above h1 { font-size: 2.8rem; top: 12%; }
            .hero-bottle-main { width: 240px; }
            .main-action-btn { font-size: 1.4rem; min-width: 240px; padding: 0.8rem 1.5rem; letter-spacing: 4px; }
            .hand-left, .hand-right { transform: scale(0.6); }
            .sun-beam { width: 200px; height: 350px; top: 18%; }
            .sun-beam-wide { width: 300px; height: 400px; top: 17%; }
        }
    </style>
</head>
<body>

<!-- ФОН ПЕРВОЙ СТРАНИЦЫ -->
<div class="hero-fullscreen-bg" id="heroBg">
    <img src="/images/botl.png" alt="Премиальный алкоголь" id="bgBottleImg">
    <div class="vignette-overlay"></div>
</div>

<!-- ВЕРХНЯЯ НАВИГАЦИОННАЯ ПАНЕЛЬ -->
<div class="top-nav">
    <div class="nav-container">
        <a class="nav-link active" href="/main">🏠 Главная</a>
        <a class="nav-link" href="/level">🍾 Уровни</a>
        <a class="nav-link" href="/assortment">🍷 Ассортимент</a>
        <a class="nav-link" href="/cocktails">🍹 Коктейли</a>
        <a class="nav-link" href="/profile">👤 Профиль</a>
    </div>
</div>

<!-- ========= ДВЕ БОКОВЫЕ КНОПКИ: CREATE COCKTAIL & CREATE INGREDIENT ========= -->
<div class="side-actions">
    <a href="/create/cocktail" class="side-btn">
        <span class="emoji">🍸</span>
        <span class="btn-text">Создать коктейль</span>
    </a>
    <a href="/create/assortement" class="side-btn">
        <span class="emoji">🥃</span>
        <span class="btn-text">Создать ингредиент</span>
    </a>
</div>

<div class="content-wrapper">
    <!-- ГЛАВНАЯ СТРАНИЦА -->
    <div id="homePage" class="fullscreen">
        <div class="hero">
            <div class="logo-above">
                <h1>ALKA</h1>
                <p>PREMIUM</p>
            </div>
            <div class="logo-glow"></div>
            <div class="sun-beam"></div>
            <div class="sun-beam-wide"></div>
            <div class="hands-holder">
                <div class="hand-left"></div>
                <div class="hand-right"></div>
            </div>
            <div class="fingers">
                <div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div>
            </div>
            <div class="hero-bottle-main">
                <svg viewBox="0 0 400 700" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="200" cy="650" rx="70" ry="15" fill="rgba(0,0,0,0.5)" filter="url(#blur)"/>
                    <path d="M135 180 L265 180 L285 500 L115 500 L135 180Z" fill="url(#glassGrad)" stroke="rgba(0,150,255,0.4)" stroke-width="2"/>
                    <rect x="160" y="80" width="80" height="100" rx="5" fill="url(#glassGrad)" stroke="rgba(0,150,255,0.4)" stroke-width="2"/>
                    <rect x="153" y="60" width="94" height="25" rx="8" fill="#0a4d8c" stroke="#00a6ff" stroke-width="1.5"/>
                    <ellipse cx="200" cy="60" rx="47" ry="6" fill="#00a6ff" opacity="0.6"/>
                    <rect x="140" y="230" width="120" height="240" rx="12" fill="rgba(0,10,30,0.85)" stroke="#00a6ff" stroke-width="1.5"/>
                    <text x="200" y="270" text-anchor="middle" fill="#4cc9ff" font-size="15" font-weight="bold" font-family="Arial, sans-serif">FINLAND</text>
                    <text x="200" y="295" text-anchor="middle" fill="#00a6ff" font-size="18" font-weight="800" font-family="Arial, sans-serif">ICE</text>
                    <line x1="155" y1="312" x2="245" y2="312" stroke="#00a6ff" stroke-width="0.5" opacity="0.5"/>
                    <text x="200" y="340" text-anchor="middle" fill="#8ec9ff" font-size="11" font-family="Arial, sans-serif">УТРО БЕЗ</text>
                    <text x="200" y="358" text-anchor="middle" fill="#8ec9ff" font-size="11" font-family="Arial, sans-serif">ВОСПОМИНАНИЙ</text>
                    <line x1="155" y1="375" x2="245" y2="375" stroke="#00a6ff" stroke-width="0.5" opacity="0.5"/>
                    <text x="200" y="400" text-anchor="middle" fill="#4cc9ff" font-size="10" font-family="Arial, sans-serif">ПОЖИЗНЕНЫЙ</text>
                    <text x="200" y="418" text-anchor="middle" fill="#4cc9ff" font-size="10" font-family="Arial, sans-serif">АЛКАГОЛИЗМ</text>
                    <line x1="155" y1="435" x2="245" y2="435" stroke="#00a6ff" stroke-width="0.5" opacity="0.5"/>
                    <text x="200" y="460" text-anchor="middle" fill="#4cc9ff" font-size="14" font-weight="bold" font-family="Arial, sans-serif">не 40% vol.</text>
                    <text x="200" y="480" text-anchor="middle" fill="#8ec9ff" font-size="11" font-family="Arial, sans-serif">1L</text>
                    <path d="M145 190 L155 190 L150 490 L140 490Z" fill="rgba(255,255,255,0.1)"/>
                    <path d="M245 200 L250 200 L245 470 L240 470Z" fill="rgba(255,255,255,0.05)"/>
                    <defs>
                        <filter id="blur"><feGaussianBlur stdDeviation="3"/></filter>
                        <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="rgba(0,150,255,0.2)"/>
                            <stop offset="50%" stop-color="rgba(0,80,150,0.35)"/>
                            <stop offset="100%" stop-color="rgba(0,40,80,0.45)"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <button class="main-action-btn" onclick="window.location.href='/levels'">НАЛИВАЙ</button>
            <div class="hero-footer">
                <span>✦ PHENIX BEER</span>
                <span>✦ BARRISTER GIN</span>
                <span>✦ FINLAND ICE</span>
            </div>
        </div>
    </div>
</div>

<div class="bottle-wall" id="bottleWall"></div>

<script>
    // Декоративный фон для страниц
    const localBottles = [
        '/static/images/vodka.png',
        '/static/images/bottle.png',
        '/static/images/finsky-ice.jpeg',
        '/static/images/stakan.png',
        '/static/images/redbull.png'
    ];

    const bgWall = document.getElementById('bottleWall');
    for (let i = 0; i < 28; i++) {
        const img = document.createElement('img');
        img.classList.add('bg-bottle');
        img.src = localBottles[i % localBottles.length];
        img.onerror = function() { this.style.display = 'none'; };
        const rot = (Math.random() - 0.5) * 12;
        const sc = 0.7 + Math.random() * 0.7;
        img.style.transform = `rotate(${rot}deg) scale(${sc})`;
        img.style.width = `${120 + Math.random() * 70}px`;
        bgWall.appendChild(img);
    }

    // Добавляем класс для фона на всех страницах кроме главной
    if (window.location.pathname !== '/') {
        document.body.classList.add('level-active');
    }
</script>
</body>
</html>
